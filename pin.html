<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>PIN Security - PalmPay</title>
<style>
  :root {
    --bg: #0f0f12;
    --panel: #17171c;
    --muted: #9aa2b2;
    --text: #fff;
    --accent: #7c3aed;
    --border: rgba(255,255,255,0.12);
  }
  [data-theme="light"] {
    --bg: #f5f5f7;
    --panel: #ffffff;
    --muted: #6b7280;
    --text: #111;
    --border: rgba(0,0,0,0.1);
  }
  html, body { height: 100dvh; margin: 0; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  .app { max-width: 420px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; padding: 14px; }
  header { display: flex; align-items: center; gap: 12px; padding-bottom: 14px; }
  .back-btn { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .title { font-weight: 700; font-size: 18px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .field { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text); margin-top: 12px; font-size: 14px; }
  .field::placeholder { color: rgba(255,255,255,0.5); }
  .primary { width: 100%; padding: 12px; border-radius: 12px; border: none; background: linear-gradient(90deg, var(--accent), #5b21b6); color: #fff; font-weight: 700; cursor: pointer; margin-top: 14px; }
  .status { margin-top: 10px; font-size: 13px; min-height: 18px; }
  .link { margin-top: 14px; font-size: 13px; color: var(--accent); text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="back-btn" id="backBtn" title="Back">←</button>
    <div>
      <div class="title" id="pageTitle">Secure PIN</div>
      <div class="subtitle" id="pageSubtitle">Protect your transfers with a PIN</div>
    </div>
  </header>

  <div class="card">
    <div class="section" id="pinSection">
      <div class="subtitle" id="actionSubtitle">Enter your PIN to proceed</div>
      <input type="password" id="pinInput" class="field" placeholder="Enter 4-digit PIN" maxlength="6" inputmode="numeric" />
      <input type="password" id="pinConfirmInput" class="field" placeholder="Confirm PIN" maxlength="6" inputmode="numeric" style="display:none;" />
      <button class="primary" id="actionBtn">Continue</button>
      <div class="status" id="status"></div>
      <div class="link" id="forgotLink" style="display:none;">Forgot PIN? Reset</div>
    </div>
  </div>
</div>

<script>
const LS_PIN = 'demo_pin';

function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

const action = getQueryParam('action') || 'verify'; // verify | set | change
const next = getQueryParam('next') || 'index.html';

const title = document.getElementById('pageTitle');
const subtitle = document.getElementById('pageSubtitle');
const actionSubtitle = document.getElementById('actionSubtitle');
const pinInput = document.getElementById('pinInput');
const pinConfirmInput = document.getElementById('pinConfirmInput');
const actionBtn = document.getElementById('actionBtn');
const status = document.getElementById('status');
const backBtn = document.getElementById('backBtn');
const forgotLink = document.getElementById('forgotLink');

function setStatus(msg, ok = true) {
  status.textContent = msg;
  status.style.color = ok ? '#22c55e' : '#ef4444';
}

function navigateTo(url) {
  window.location.href = url;
}

function clearStatus() {
  status.textContent = '';
}

function init() {
  const savedPin = localStorage.getItem(LS_PIN);

  if (action === 'set') {
    title.textContent = 'Set PIN';
    actionSubtitle.textContent = 'Create a 4-digit PIN for transactions';
    pinConfirmInput.style.display = 'block';
    actionBtn.textContent = savedPin ? 'Change PIN' : 'Set PIN';
    forgotLink.style.display = 'none';
  } else if (action === 'change') {
    title.textContent = 'Change PIN';
    actionSubtitle.textContent = 'Enter your current PIN then choose a new one';
    pinConfirmInput.style.display = 'block';
    actionBtn.textContent = 'Change PIN';
    forgotLink.style.display = 'block';
  } else {
    title.textContent = 'Enter PIN';
    actionSubtitle.textContent = 'Enter your PIN to proceed';
    pinConfirmInput.style.display = 'none';
    actionBtn.textContent = 'Verify PIN';
    if (!savedPin) {
      // If no PIN set yet, redirect to set
      window.location.href = `pin.html?action=set&next=${encodeURIComponent(next)}`;
      return;
    }
    forgotLink.style.display = 'block';
  }

  if (!savedPin && action === 'verify') {
    window.location.href = `pin.html?action=set&next=${encodeURIComponent(next)}`;
    return;
  }
}

function validatePinFormat(pin) {
  return /^\d{4,6}$/.test(pin);
}

function handleAction() {
  clearStatus();
  const pin = pinInput.value.trim();
  const confirm = pinConfirmInput.value.trim();

  if (!validatePinFormat(pin)) {
    setStatus('PIN must be 4-6 digits', false);
    return;
  }

  const savedPin = localStorage.getItem(LS_PIN);

  if (action === 'set') {
    if (!validatePinFormat(confirm)) {
      setStatus('Please confirm your PIN', false);
      return;
    }
    if (pin !== confirm) {
      setStatus('PINs do not match', false);
      return;
    }
    localStorage.setItem(LS_PIN, pin);
    setStatus('PIN saved successfully');
    setTimeout(() => {
      sessionStorage.setItem('pinVerified', '1');
      window.location.href = next;
    }, 800);
    return;
  }

  if (action === 'change') {
    if (!savedPin) {
      setStatus('No PIN exists. Please set one.', false);
      setTimeout(() => window.location.href = `pin.html?action=set&next=${encodeURIComponent(next)}` , 800);
      return;
    }
    if (pin !== savedPin) {
      setStatus('Current PIN is incorrect', false);
      return;
    }
    if (!validatePinFormat(confirm)) {
      setStatus('Please enter a new PIN (4-6 digits)', false);
      return;
    }
    if (pin === confirm) {
      setStatus('Please use a different PIN', false);
      return;
    }
    localStorage.setItem(LS_PIN, confirm);
    setStatus('PIN changed successfully');
    setTimeout(() => {
      window.location.href = 'me.html';
    }, 800);
    return;
  }

  // verify
  if (pin !== savedPin) {
    setStatus('Incorrect PIN', false);
    return;
  }

  setStatus('PIN verified');
  sessionStorage.setItem('pinVerified', '1');
  setTimeout(() => {
    window.location.href = next;
  }, 700);
}

actionBtn.addEventListener('click', handleAction);
backBtn.addEventListener('click', () => {
  window.location.href = next;
});
forgotLink.addEventListener('click', () => {
  window.location.href = `pin.html?action=set&next=${encodeURIComponent(next)}`;
});

init();
</script>
</body>
</html>
